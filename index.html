<body>
<div id="root"></div>

<script type="text/babel">
/* ─── CONSTANTS ──────────────────────────────────────────────── */
const MAX_CHARS = 1500;
const MAX_RETRIES = 5;
/* FIX: actual Bengali Unicode, not romanized transliteration */
const PREVIEW_SCRIPT = "ইশান বাংলা নিউজে আপনাকে স্বাগত জানাই";

/* ─── HELPERS ────────────────────────────────────────────────── */
const delay = ms => new Promise(r => setTimeout(r, ms));

const pcmToWav = (pcmData, sampleRate = 24000) => {
    const buf  = new ArrayBuffer(44 + pcmData.length);
    const view = new DataView(buf);
    const str  = (off, s) => [...s].forEach((c, i) => view.setUint8(off + i, c.charCodeAt(0)));
    str(0, 'RIFF'); view.setUint32(4, 36 + pcmData.length, true);
    str(8, 'WAVE'); str(12, 'fmt ');
    view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true); view.setUint16(34, 16, true);
    str(36, 'data'); view.setUint32(40, pcmData.length, true);
    new Uint8Array(buf, 44).set(pcmData);
    return buf;
};

const b64ToBytes = b64 => {
    const bin = atob(b64), bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
};

/* ─── TOKEN-EFFICIENT PROMPT BUILDER ────────────────────────────
   Reduced from ~200 tokens → ~55 tokens per call.
   Only the dynamic parts change; boilerplate is stripped.       */
const buildPrompt = (script, category, promptMod, speedText, pitchHint, langHint, voiceName) => {
    const toneOverride = voiceName === 'Fenrir'
        ? 'extremely rough, highly opinionated, tense, and aggressive like a debate anchor'
        : promptMod;
    return `News anchor. Segment: ${category}. Tone: ${toneOverride}. Pace: ${speedText}. Pitch: ${pitchHint}. Lang: ${langHint}.\n\n"${script}"`;
};

/* ─── DATA ───────────────────────────────────────────────────── */
const CATEGORIES = [

    { id:'Sports',                 label:'Sports',        icon:'fa-trophy',          color:'bg-green-600',  promptMod:'energetic, exciting, and highly passionate' },
    { id:'Politics',               label:'Politics',      icon:'fa-landmark',        color:'bg-yellow-600', promptMod:'authoritative, analytical, and formal' },
    { id:'Entertainment & Lifestyle', label:'Lifestyle',  icon:'fa-masks-theater',   color:'bg-emerald-700',promptMod:'light-hearted, friendly, and conversational' },
    { id:'Business & Economy',     label:'Business',      icon:'fa-chart-line',      color:'bg-sky-600',    promptMod:'authoritative, clear, and measured' },
    { id:'Crime & Law',            label:'Crime & Law',   icon:'fa-handcuffs',       color:'bg-amber-800',  promptMod:'grave, serious, and deliberate' },
    { id:'Community & Local News', label:'Local News',    icon:'fa-people-group',    color:'bg-pink-600',   promptMod:'warm, localized, and friendly' },
    { id:'Weather',                label:'Weather',       icon:'fa-cloud-sun',       color:'bg-purple-700', promptMod:'calm, clear, and helpful' },
    { id:'Education & Youth',      label:'Education',     icon:'fa-graduation-cap',  color:'bg-indigo-700', promptMod:'optimistic, encouraging, and inspiring' },
    { id:'Awareness',              label:'Awareness',     icon:'fa-hand-holding-heart', color:'bg-blue-800',promptMod:'inspirational, clear, and motivational' },
    { id:'Social & Cultural',      label:'Culture',       icon:'fa-brush',           color:'bg-gray-800',   promptMod:'reflective, respectful, and appreciative' },
];

const VOICES = [
    { id:'general', title:'Standard Broadcast' },
    { name:'Puck',         label:'Anirban (M)',               desc:'Balanced & Neutral',                  type:'general' },
    { name:'Kore',         label:'Sumita (F)',                desc:'Calm & Professional',                 type:'general' },
    { name:'Callirrhoe',   label:'Sanjana (F)',               desc:'Versatile, Easy-going',               type:'general' },
    { id:'serious', title:'Crime & Impact' },
    { name:'Fenrir',       label:'Confrontational Anchor (M)',desc:'Rough, Intense, Highly Opinionated',  type:'serious' },
    { name:'Charon',       label:'Arijit (M)',                desc:'Deep, Grave — Crime Desk',            type:'serious' },
    { name:'Orus',         label:'Prosenjit (M)',             desc:'Firm & Commanding — Politics',        type:'serious' },
    { name:'Algenib',      label:'Ranit (M)',                 desc:'Gravelly, Deep — Urgent Situations',  type:'serious' },
    { id:'solemn', title:'Memorial & Solemn' },
    { name:'Vindemiatrix', label:'Arpita (F)',                desc:'Gentle, Subdued — Memorials',         type:'solemn' },
    { id:'energetic', title:'Energy & Lifestyle' },
    { name:'Aoede',        label:'Sunaina (F)',               desc:'Bright & Engaging — Entertainment',   type:'energetic' },
    { name:'Zephyr',       label:'Ritika (F)',                desc:'High Energy — Youth / Sports',        type:'energetic' },
    { name:'Leda',         label:'Poulomi (F)',               desc:'Youthful, Lively — Dynamic Segments', type:'energetic' },
];

const PITCH_OPTIONS = [
    { id:'low',    label:'Low',    icon:'fa-volume-down',  desc:'Deep & Resonant' },
    { id:'normal', label:'Normal', icon:'fa-volume-mute',  desc:'Default Pitch' },
    { id:'high',   label:'High',   icon:'fa-volume-up',    desc:'Elevated & Energetic' },
];

const LANG_OPTIONS = [
    { id:'auto',    label:'Auto',    icon:'fa-language',  hint:'Detect language automatically' },
    { id:'bengali', label:'Bengali', icon:'fa-bahai',     hint:'Prioritize Bengali pronunciation' },
    { id:'english', label:'English', icon:'fa-a',         hint:'Prioritize American English' },
];

const speedLabel = lvl => ['','Normal','Brisk','Fast','Urgent'][lvl];
const speedText  = lvl => ['','normal pace','brisk pace','fast pace','extremely fast pace'][lvl];
const pitchHint  = p  => ({ low:'low pitch', normal:'natural pitch', high:'high pitch' })[p];
const langHint   = l  => ({ auto:'auto-detect', bengali:'Bengali', english:'English' })[l];

/* ─── API CALL ───────────────────────────────────────────────── */
const callTTS = async (apiKey, voiceName, text) => {
    const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`,
        {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text }] }],
                generationConfig: {
                    responseModalities: ['AUDIO'],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName } } }
                }
            })
        }
    );
    const data = await res.json();
    if (!res.ok) {
        const msg = data.error?.message || `HTTP ${res.status}`;
        if (res.status === 429 || msg.includes('quota')) throw new Error('QUOTA:' + msg);
        throw new Error(msg);
    }
    const inline = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
    if (!inline) throw new Error('No audio data returned — model may have refused the request.');
    const wavBuf = pcmToWav(b64ToBytes(inline.data));
    const url    = URL.createObjectURL(new Blob([wavBuf], { type: 'audio/wav' }));
    return url;
};

/* ─── ISHAN BANGLA LOGO (inline SVG recreation) ─────────────── */
const IshanBanglaLogo = ({ size = 'md' }) => {
    const heights = { sm: 117, md: 247, lg: 359 };
    const h = heights[size] || 110;
    return <img src="assets/logo.png" alt="Ishan Bangla News" style={{ height: h, width: 'auto', objectFit: 'contain' }} />;
};

/* ─── PIN UTILITIES ──────────────────────────────────────────── */
const PIN_KEY  = 'ibStudioPin';
const SESSION  = 'ibStudioUnlocked';
const hashPin  = async raw => {
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw + 'ishan-salt'));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
};

/* ─── PIN LOCK SCREEN ────────────────────────────────────────── */
const PinScreen = ({ mode, onSuccess }) => {
    const [entry,    setEntry]    = React.useState('');
    const [confirm,  setConfirm]  = React.useState('');
    const [step,     setStep]     = React.useState(mode === 'set' ? 'create' : 'enter'); // create | verify | enter
    const [shake,    setShake]    = React.useState(false);
    const [hint,     setHint]     = React.useState(mode === 'set' ? 'Set a 4-digit PIN to protect your Studio' : 'Enter your PIN');

    const triggerShake = msg => {
        setShake(true); setTimeout(() => setShake(false), 400);
        setHint(msg); setEntry('');
    };

    const press = async digit => {
        const next = (entry + digit).slice(0, 4);
        setEntry(next);
        if (next.length < 4) return;

        if (step === 'create') {
            setConfirm(next); setEntry(''); setStep('verify'); setHint('Confirm your PIN');
        } else if (step === 'verify') {
            if (next === confirm) {
                const h = await hashPin(next);
                localStorage.setItem(PIN_KEY, h);
                sessionStorage.setItem(SESSION, '1');
                onSuccess();
            } else {
                setConfirm(''); triggerShake("PINs didn't match — try again");
                setStep('create'); setHint('Set a 4-digit PIN');
            }
        } else {
            const stored = localStorage.getItem(PIN_KEY);
            const h = await hashPin(next);
            if (h === stored) { sessionStorage.setItem(SESSION, '1'); onSuccess(); }
            else triggerShake('Incorrect PIN');
        }
    };

    const del = () => setEntry(e => e.slice(0, -1));

    return (
        <div className="pin-screen">
            <div className="mb-10"><IshanBanglaLogo size="md" /></div>
            <p style={{ color:'#94a3b8', fontSize:'0.85rem', marginBottom:'2rem', letterSpacing:'0.05em' }}>{hint}</p>

            {/* Dots */}
            <div className={`flex gap-4 mb-10 ${shake ? 'shake' : ''}`}>
                {[0,1,2,3].map(i => (
                    <div key={i} className={`pin-dot ${i < entry.length ? 'filled' : ''}`}/>
                ))}
            </div>

            {/* Keypad */}
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,72px)', gap:'12px' }}>
                {[1,2,3,4,5,6,7,8,9].map(n => (
                    <button key={n} className="pin-key" onClick={() => press(String(n))}>{n}</button>
                ))}
                <div/>
                <button className="pin-key" onClick={() => press('0')}>0</button>
                <button className="pin-key" onClick={del} style={{ fontSize:'1.2rem' }}>
                    <i className="fa-solid fa-delete-left"/>
                </button>
            </div>

            {mode === 'set' && (
                <p style={{ color:'#475569', fontSize:'0.75rem', marginTop:'2rem', maxWidth:'220px', textAlign:'center' }}>
                    PIN is stored encrypted — it cannot be recovered. Keep it safe.
                </p>
            )}
        </div>
    );
};

/* ─── SUB-COMPONENTS (React.memo to avoid re-renders) ────────── */
const CategorySelector = React.memo(({ category, onChange, isDark, bgControlHover }) => (

                        }`}>

));

const VoiceSelector = React.memo(({ voice, onChange, onPreview, previewingVoice, isDark, textPrimary, textMuted, bgControlHover }) => (

            );

    </div>
));

                            }`}>

                        <span className="text-xs">{l.label}</span>
                    </button>
                ))}
            </div>
        </div>
    </div>
));

/* ─── SETTINGS MODAL ─────────────────────────────────────────── */

                        <span>Key is stored in browser localStorage. Do not use on shared/public devices.</span>
                    </div>
                    <div className={`text-xs ${textMuted} mt-3 space-y-1 p-3 ${isDark ? 'bg-[#11141f] border border-slate-800 rounded-lg' : 'bg-slate-50 border border-slate-200 rounded-lg'}`}>
                        <p className="font-semibold text-red-400">How to get your API Key:</p>
                        <ol className="list-decimal list-inside ml-2 space-y-1">
                            <li>Go to <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-red-400 hover:underline">Google AI Studio</a>.</li>
                            <li>Click <strong>Create API key</strong> and copy the string.</li>
                            <li>Paste above and click Save.</li>
                        </ol>
                    </div>
                </div>
            </div>
            <div className={`p-4 ${isDark ? 'bg-[#11141f]' : 'bg-slate-50'} flex items-center justify-between`}>
                <button onClick={onChangePin}
                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-colors ${isDark ? 'text-slate-400 hover:text-red-400 hover:bg-slate-800' : 'text-slate-500 hover:text-red-500 hover:bg-slate-100'}`}>
                    <i className="fa-solid fa-key text-xs"/>
                    Change PIN
                </button>
                <button onClick={onClose} className="px-6 py-2 bg-red-600 text-white font-bold rounded-lg hover:bg-red-500 transition-colors neon-button">
                    Save & Close
                </button>
            </div>
        </div>
    </div>
));

/* ─── PIN GATE WRAPPER ───────────────────────────────────────── */
const App = () => {
    const hasPin    = !!localStorage.getItem(PIN_KEY);
    const sessionOk = !!sessionStorage.getItem(SESSION);
    const [unlocked, setUnlocked] = React.useState(sessionOk);

    if (!unlocked)
        return <PinScreen mode={hasPin ? 'enter' : 'set'} onSuccess={() => setUnlocked(true)} />;

    return <Studio onLock={() => setUnlocked(false)} />;
};

/* ─── MAIN STUDIO ────────────────────────────────────────────── */
const Studio = ({ onLock }) => {
    const [apiKey,    setApiKey]    = React.useState(() => localStorage.getItem('geminiApiKey') || '');
    const [script,    setScript]    = React.useState('');
    const [category,  setCategory]  = React.useState(() => localStorage.getItem('defaultCategory') || 'Breaking News');
    const [voice,     setVoice]     = React.useState(() => localStorage.getItem('defaultVoice')    || 'Puck');
    const [speedLevel,setSpeedLevel]= React.useState(2);
    const [pitch,     setPitch]     = React.useState('normal');
    const [lang,      setLang]      = React.useState('auto');
    const [theme,     setTheme]     = React.useState(() => localStorage.getItem('appTheme') || 'dark');
    const [loading,   setLoading]   = React.useState(false);
    const [retryInfo, setRetryInfo] = React.useState('');   /* NEW: retry progress */
    const [audioSrc,  setAudioSrc]  = React.useState(null);
    const [error,     setError]     = React.useState('');
    const [showSettings, setShowSettings] = React.useState(false);
    const [previewingVoice, setPreviewingVoice] = React.useState(null);
    const prevAudioRef = React.useRef(null); /* track prev URL for revoke */

    /* Theme tokens */
    const isDark         = theme === 'dark';
    const bgCard         = isDark ? 'bg-[#1f2937] border-slate-800'  : 'bg-white border-slate-200 shadow-lg';
    const textHeader     = isDark ? 'text-white'     : 'text-slate-900';
    const textPrimary    = isDark ? 'text-slate-100' : 'text-slate-800';
    const textMuted      = isDark ? 'text-slate-400' : 'text-slate-500';
    const bgInput        = isDark ? 'bg-[#11141f] border-slate-800 text-white placeholder:text-slate-600' : 'bg-slate-50 border-slate-300 text-slate-900 placeholder:text-slate-400';
    const borderSubtle   = isDark ? 'border-slate-700' : 'border-slate-300';
    const bgNav          = isDark ? 'header-bg-dark border-slate-800' : 'header-bg-light border-slate-200';
    const bgControlHover = isDark ? 'hover:bg-[#323f53]' : 'hover:bg-slate-200';

    /* Persist voice/category changes */
    const handleCategoryChange = React.useCallback(v => { setCategory(v); localStorage.setItem('defaultCategory', v); }, []);
    const handleVoiceChange    = React.useCallback(v => { setVoice(v);    localStorage.setItem('defaultVoice', v);    }, []);

    /* FIX: revoke old blob URL before setting a new one */
    const setAudio = url => {
        if (prevAudioRef.current) URL.revokeObjectURL(prevAudioRef.current);
        prevAudioRef.current = url;
        setAudioSrc(url);
    };

    /* Voice preview */
    const generateVoicePreview = async name => {
        if (!apiKey) { setShowSettings(true); setError('Add your API key in Settings first.'); return; }
        setPreviewingVoice(name);
        try {
            const url = await callTTS(apiKey, name, PREVIEW_SCRIPT);
            const audio = new Audio(url);
            audio.onended = () => { URL.revokeObjectURL(url); setPreviewingVoice(null); };
            audio.play().catch(() => setPreviewingVoice(null));
        } catch (err) {
            setError('Preview failed: ' + err.message);
        } finally {
            /* FIX: always clear loading state */
            setPreviewingVoice(null);
        }
    };

    /* Main generation — with retry progress */
    const generateVoiceover = async () => {
        if (!apiKey) { setShowSettings(true); setError('Add your API key in Settings first.'); return; }
        if (!script.trim()) { setError('Please enter a script.'); return; }
        if (script.length > MAX_CHARS) { setError(`Script too long. Max ${MAX_CHARS} chars.`); return; }

        setLoading(true); setError(''); setRetryInfo(''); setAudioSrc(null);

        const cat = CATEGORIES.find(c => c.id === category);
        const prompt = buildPrompt(script, category, cat.promptMod, speedText(speedLevel), pitchHint(pitch), langHint(lang), voice);

        for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
            try {
                const url = await callTTS(apiKey, voice, prompt);
                setAudio(url);
                return;
            } catch (err) {
                if (err.message.startsWith('QUOTA:') || attempt === MAX_RETRIES - 1) {
                    setError(err.message.replace('QUOTA:', ''));
                    return;
                }
                /* NEW: show retry progress to user */
                const wait = Math.pow(2, attempt) * 1000;
                setRetryInfo(`Attempt ${attempt + 1}/${MAX_RETRIES} failed — retrying in ${wait / 1000}s…`);
                await delay(wait);
            }
        }
    };

    /* FIX: Ctrl/Cmd + Enter keyboard shortcut */
    React.useEffect(() => {
        const handler = e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && !loading) generateVoiceover();
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
    }, [script, voice, category, speedLevel, pitch, lang, apiKey, loading]);

    /* Clean up blob URL on unmount */
    React.useEffect(() => () => { if (prevAudioRef.current) URL.revokeObjectURL(prevAudioRef.current); }, []);

    const canGenerate = !loading && script.trim().length > 0 && script.length <= MAX_CHARS && !!apiKey;

    return (
        <div className={`min-h-screen font-sans selection:bg-red-500 selection:text-white ${isDark ? 'dark-theme' : 'light-theme'}`}>

            {/* ── NAV ── */}
            <nav className={`${bgNav} border-b sticky top-0 z-20 transition-colors`}>
                <div className="max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
                    <div className="flex items-center gap-5">
                        <IshanBanglaLogo size="sm" />
                        <div className={`h-10 w-px ${isDark ? 'bg-slate-700' : 'bg-slate-300'}`}/>
                        <div>
                            <h1 className={`font-extrabold text-2xl leading-snug tracking-tight ${textHeader}`}>AI News Studio</h1>
                            <p className={`text-xs ${textMuted} font-medium uppercase tracking-[0.18em]`}>Broadcast Voice Suite</p>
                        </div>
                    </div>
                    <div className="flex items-center gap-2">
                    <button onClick={() => { sessionStorage.removeItem(SESSION); onLock(); }}
                        className={`h-10 w-10 rounded-full flex items-center justify-center transition-all shadow-md ${isDark ? 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-red-400' : 'bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-red-500'}`}
                        title="Lock Studio">
                        <i className="fa-solid fa-lock text-sm"></i>
                    </button>
                    <button onClick={() => setShowSettings(true)}
                        className={`h-10 w-10 rounded-full flex items-center justify-center transition-all shadow-md
                            ${apiKey
                                ? (isDark ? 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-800')
                                : 'bg-red-500/10 text-red-500 ring-2 ring-red-500 animate-pulse'
                            }`} title="Settings">
                        <i className="fa-solid fa-gear"></i>
                    </button>
                    </div>{/* end nav-buttons */}
                </div>
            </nav>

            <main className="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">

                {/* ── LEFT PANEL ── */}
                <div className="lg:col-span-4 space-y-8">

                    {/* Segment selector */}
                    <div className={`${bgCard} p-6 rounded-2xl shadow-xl border ${borderSubtle}`}>
                        <h3 className="text-xs font-bold text-red-500 uppercase tracking-widest mb-4">SEGMENT TYPE</h3>
                        <CategorySelector category={category} onChange={handleCategoryChange} isDark={isDark} bgControlHover={bgControlHover} />
                    </div>

                    {/* Fine tuning */}
                    <div className={`${bgCard} p-6 rounded-2xl shadow-xl border ${borderSubtle}`}>
                        <h3 className={`text-xs font-bold text-red-500 uppercase tracking-widest mb-4 border-b ${borderSubtle} pb-2`}>FINE TUNING</h3>
                        <FineTuning
                            speedLevel={speedLevel} setSpeedLevel={setSpeedLevel}
                            pitch={pitch} setPitch={setPitch}
                            lang={lang} setLang={setLang}
                            isDark={isDark} textPrimary={textPrimary} textMuted={textMuted}
                            bgControlHover={bgControlHover} borderSubtle={borderSubtle} />
                    </div>
                </div>

                {/* ── RIGHT PANEL ── */}
                <div className="lg:col-span-8 flex flex-col gap-6">

                    {/* Script editor */}
                    <div className={`flex-1 ${bgCard} rounded-2xl border ${borderSubtle} shadow-2xl overflow-hidden flex flex-col`}>
                        <div className={`${isDark ? 'bg-[#11141f]' : 'bg-slate-50'} px-6 py-3 border-b ${borderSubtle} flex justify-between items-center`}>
                            <span className={`text-sm font-bold ${textMuted} uppercase tracking-wider`}>Teleprompter Script</span>
                            <div className="flex items-center gap-3">
                                <span className={`text-xs ${textMuted}`}>
                                    <kbd className={`px-1.5 py-0.5 rounded text-[10px] font-mono ${isDark ? 'bg-slate-700 text-slate-400' : 'bg-slate-200 text-slate-500'}`}>Ctrl</kbd>
                                    <span className="mx-1">+</span>
                                    <kbd className={`px-1.5 py-0.5 rounded text-[10px] font-mono ${isDark ? 'bg-slate-700 text-slate-400' : 'bg-slate-200 text-slate-500'}`}>↵</kbd>
                                    <span className="ml-1">to generate</span>
                                </span>
                                <span className={`text-xs font-medium ${script.length > MAX_CHARS ? 'text-red-400' : textMuted}`}>
                                    {script.length} / {MAX_CHARS}
                                </span>
                            </div>
                        </div>
                        <textarea
                            className={`flex-1 w-full bg-transparent p-6 outline-none resize-none text-xl leading-relaxed bengali-text ${textPrimary} ${isDark ? 'placeholder:text-slate-600' : 'placeholder:text-slate-400'}`}
                            style={{ minHeight: '220px' }}
                            placeholder="Enter your news script here (Bengali or English)…"
                            value={script}
                            onChange={e => { if (e.target.value.length <= MAX_CHARS) setScript(e.target.value); }}
                        />
                    </div>

                    {/* Error toast */}
                    {error && (
                        <div className="bg-red-500/10 border border-red-700 text-red-400 px-6 py-4 rounded-xl text-sm flex items-center gap-3 animate-fade-in shadow-lg">
                            <i className="fa-solid fa-triangle-exclamation text-lg shrink-0"></i>
                            <span className="font-semibold">{error}</span>
                        </div>
                    )}

                    {/* NEW: Retry progress toast */}
                    {retryInfo && (
                        <div className={`px-6 py-3 rounded-xl text-sm flex items-center gap-3 animate-fade-in border ${isDark ? 'bg-yellow-900/20 border-yellow-700/40 text-yellow-400' : 'bg-yellow-50 border-yellow-300 text-yellow-700'}`}>
                            <i className="fa-solid fa-rotate fa-spin shrink-0"></i>
                            <span>{retryInfo}</span>
                        </div>
                    )}

                    {/* Action card */}
                    <div className={`${bgCard} rounded-2xl border ${borderSubtle} p-6 shadow-2xl`}>

                        {!audioSrc && (
                            <button onClick={generateVoiceover} disabled={!canGenerate}
                                className={`w-full py-4 rounded-xl font-bold text-lg shadow-xl transition-all flex items-center justify-center gap-3
                                    ${canGenerate
                                        ? 'bg-red-700 hover:bg-red-600 text-white shadow-red-900/40 neon-button'
                                        : `${isDark ? 'bg-slate-700 text-slate-400' : 'bg-slate-300 text-slate-500'} cursor-not-allowed`
                                    }`}>
                                {loading
                                    ? <><i className="fa-solid fa-circle-notch fa-spin"></i> Broadcasting…</>
                                    : <><i className="fa-solid fa-bullhorn text-xl"></i> Generate Voiceover <span className={`text-xs ml-1 opacity-60`}>(Ctrl+↵)</span></>
                                }
                            </button>
                        )}

                        {/* Voice selector */}
                        <div className={`mt-6 ${bgCard} p-6 rounded-2xl shadow-xl border ${borderSubtle}`}>
                            <h3 className="text-xs font-bold text-red-500 uppercase tracking-widest mb-4">VOICE TALENT</h3>
                            <VoiceSelector
                                voice={voice} onChange={handleVoiceChange}
                                onPreview={generateVoicePreview} previewingVoice={previewingVoice}
                                isDark={isDark} textPrimary={textPrimary} textMuted={textMuted} bgControlHover={bgControlHover} />
                        </div>

                        {/* Audio player */}
                        {audioSrc && (
                            <div className="animate-fade-in mt-6">
                                <div className={`flex items-center justify-between mb-5 pb-5 border-b ${borderSubtle}`}>
                                    <div className="flex items-center gap-4">
                                        <div className="h-12 w-12 bg-green-500/10 rounded-full flex items-center justify-center border border-green-700 text-green-500">
                                            <i className="fa-solid fa-check text-xl"></i>
                                        </div>
                                        <div>
                                            <h3 className={`font-bold ${textPrimary} text-xl`}>Broadcast Complete</h3>
                                            <p className={`text-sm ${textMuted}`}>
                                                {VOICES.find(v => v.name === voice)?.label} · {speedLabel(speedLevel)} pace
                                            </p>
                                        </div>
                                    </div>
                                    <div className="bar-container">
                                        <div className="bar"/><div className="bar"/><div className="bar"/>
                                        <div className="bar"/><div className="bar"/>
                                    </div>
                                </div>
                                <audio controls src={audioSrc} className="w-full h-10 mb-6 rounded-lg" autoPlay></audio>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => { setAudio(null); setRetryInfo(''); }}
                                        className={`py-3 rounded-xl text-sm font-semibold ${isDark ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'} transition-colors`}>
                                        <i className="fa-solid fa-file-circle-plus mr-2"></i>New Script
                                    </button>
                                    <a href={audioSrc} download={`${category.toLowerCase().replace(/[\s&]+/g,'-')}-${voice}.wav`}
                                        className="flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-semibold bg-red-600 text-white hover:bg-red-500 transition-colors neon-button">
                                        <i className="fa-solid fa-download"></i>Download WAV
                                    </a>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            </main>

            {showSettings && (
                <SettingsModal
                    apiKey={apiKey} setApiKey={setApiKey}
                    theme={theme} setTheme={setTheme}
                    onClose={() => setShowSettings(false)}
                    onChangePin={() => {
                        localStorage.removeItem(PIN_KEY);
                        sessionStorage.removeItem(SESSION);
                        setShowSettings(false);
                        onLock();
                    }}
                    isDark={isDark} bgCard={bgCard} textHeader={textHeader}
                    textMuted={textMuted} bgInput={bgInput} borderSubtle={borderSubtle} />
            )}
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
